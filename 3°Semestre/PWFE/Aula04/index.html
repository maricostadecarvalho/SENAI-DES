<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
     content="width=device-width, initial-scale=1.0">
    <title>Locadora - filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Locadora - Cadastro dos filmes</h1>
        <button onclick="abrirModal()"> + Novo filme</button>
    </header>
    <img drc="" id="tela">
    <main>
        <table>
            <thead>
                <tr>
                    <th>Nome do filme</th>
                    <th>Lançamento</th>
                    <th>Produtora</th>
                    <th>Gênero</th>
                     <th>Capa do filme</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id ="dados"></tbody>
        </table>
    </main>
    <!--Criar Modal-->
    <div id="modal" class="modal">
<div class="modal-content">
    <h2>Novo cliente</h2>
    <input type="text" id="nome do filme" 
    placeholder="nome do filme" required>
    <input type="text" id="lançamento"
     placeholder="Lançamento" required>
    <input type="text" id="produtora"
    placeholder="Produtora" required>
    <input type="text" id="gênero"
     placeholder="Gênero" required>
    <input type="text" id="capa do filme"
     placeholder="Capa do filme" required>
  

    <div class="modal- buttons">
        <button onclick="salvarfilme()">Salvar</button>
        <button onclick="fecharModal()">Cancelar</button>
    </div>
</div>
<script src="script.js"></script>
    
</body>
</html>
